<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SevereWX Live Monitoring</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="monitoringstyle.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

</head>

<body>

<nav class="navbar">
    <div class="logo">SevereWX</div>
    <div class="links">
        <a href="index.html">Home</a>
        <a href="monitoring.html">Monitoring</a>
        <a href="#">Über uns</a>
        <a href="#">Storm Info</a>
        <a href="kontakt.html">Kontakt</a>
    </div>
</nav>

<div class="monitor-box">

<h2>🌪️ SevereWX Monitoring</h2>

<div id="list"></div>
<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const locations = [






// S T A T U S
    // S T A T U S
        // S T A T U S
            // S T A T U S
                // S T A T U S
                    // S T A T U S
                        // S T A T U S
                            // S T A T U S

    // 🇺🇸 USA
    { name:"Iowa", lat:42.0, lon:-93.0, group:"us", status:"online" },
    { name:"Nebraska", lat:41.5, lon:-99.8, group:"us", status:"offline" },
    { name:"Minnesota", lat:46.0, lon:-94.0, group:"us", status:"online" },
    { name:"North Texas", lat:32.8, lon:-96.8, group:"us", status:"online" },
    { name:"Oklahoma", lat:35.5, lon:-97.5, group:"us", status:"online" }, // ← WIEDER DA

    // 🇩🇪 Germany
    { name:"Hamburg", lat:53.55, lon:9.99, group:"de", status:"online" },
    { name:"Bayern", lat:48.14, lon:11.58, group:"de", status:"offline" },
    { name:"NRW", lat:51.5, lon:7.5, group:"de", status:"online" }
];

function getRisk(cape, srh) {
    if (cape > 3000 && srh > 250) return "HIGH";
    if (cape > 2000 && srh > 180) return "MDT";
    if (cape > 1200) return "ENH";
    if (cape > 600) return "SLGT";
    return "MRGL";
}

function estimateSRH(wind, gust, cape) {
    const shear = Math.max(0, gust - wind);
    return Math.min(Math.max(shear * 12 + cape / 250, 0), 500);
}

async function fetchData(loc) {
    const res = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${loc.lat}&longitude=${loc.lon}` +
        `&hourly=temperature_2m,dew_point_2m,wind_speed_10m,wind_gusts_10m,cape`
    );
    return res.json();
}

// MAP
const map = L.map('map').setView([45, 10], 4);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap, © CartoDB'
}).addTo(map);

let markers = [];

async function update() {

    let usHTML = "<div class='section'><div class='title'>United States</div>";
    let deHTML = "<div class='section'><div class='title'>Germany</div>";

    markers.forEach(m => map.removeLayer(m));
    markers = [];

    for (let loc of locations) {

        const data = await fetchData(loc);

        const temp = data.hourly.temperature_2m?.[0];
        const dew = data.hourly.dew_point_2m?.[0];
        const wind = data.hourly.wind_speed_10m?.[0];
        const gust = data.hourly.wind_gusts_10m?.[0];
        const cape = data.hourly.cape?.[0] ?? 0;

        const srh = estimateSRH(wind, gust, cape);
        const risk = getRisk(cape, srh);

        const statusText = loc.status === "online"
            ? "SevereWX Live Monitoring"
            : "SevereWX OFFLINE";

        const statusClass = loc.status === "online"
            ? "status-online"
            : "status-offline";

        const card = `
        <div class="card">
            <div class="name">📍 ${loc.name}</div>

            <div class="data">
                🌡️ ${temp}°C | 💨 ${wind} km/h
                <span class="risk ${risk}">${risk}</span>
            </div>

            <div class="data">💧 Dew Point: ${dew}°C</div>
            <div class="data">⚡ CAPE: ${Math.round(cape)} | 🔄 SRH: ${Math.round(srh)}</div>

            <div class="${statusClass}">${statusText}</div>
        </div>
        `;

        if (loc.group === "us") usHTML += card;
        else deHTML += card;

        let color =
            risk === "HIGH" ? "red" :
            risk === "MDT" ? "orange" :
            risk === "ENH" ? "yellow" : "green";

        const marker = L.circleMarker([loc.lat, loc.lon], {
            radius: 9,
            color: color,
            fillOpacity: 1
        }).addTo(map);

        marker.bindPopup(`<b>${loc.name}</b><br>Risk: ${risk}`);

        markers.push(marker);
    }

    usHTML += "</div>";
    deHTML += "</div>";

    document.getElementById("list").innerHTML = usHTML + deHTML;
}

update();
setInterval(update, 60000);

</script>

</body>
</html>
